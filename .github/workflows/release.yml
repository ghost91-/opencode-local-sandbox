name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish, tag, and release creation)"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Version packages
        id: version
        run: |
          pnpm changeset version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for version changes
        if: steps.version.outputs.has_changes == 'false'
        run: |
          echo "No pending changesets found. Nothing to release."
          exit 0

      - name: Commit version bump and create tag
        if: steps.version.outputs.has_changes == 'true' && inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      - name: Dry run summary
        if: steps.version.outputs.has_changes == 'true' && inputs.dry_run == true
        run: |
          echo "::group::Dry run: would release v${{ steps.version.outputs.version }}"
          git diff
          echo "::endgroup::"

      - name: Create GitHub Release
        if: steps.version.outputs.has_changes == 'true' && inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          BODY=$(sed -n "/^## $TAG/,/^## /p" CHANGELOG.md | head -n -1 | tail -n +2 | sed '/^$/d;1{/^$/d}')
          if [ -z "$BODY" ]; then
            BODY="Release $TAG"
          fi
          gh release create "$TAG" --title "$TAG" --notes "$BODY"

      - name: Publish to npm
        if: steps.version.outputs.has_changes == 'true' && inputs.dry_run == false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks
